<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Confirmar Código</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="login-box">
        <h2>Confirmar Código</h2>

        <input type="text" id="usuario" placeholder="Usuário ou e-mail">
        <input type="text" id="codigo" placeholder="Código de 6 dígitos">

        <button id="btnConfirmar">Confirmar</button>

        <div class="msg" id="msg"></div>
    </div>

    <script>
        const btnConfirmar = document.getElementById('btnConfirmar');
        const msg = document.getElementById('msg');

        btnConfirmar.onclick = async () => {
            const usuario = document.getElementById('usuario').value.trim();
            const codigo = document.getElementById('codigo').value.trim();

            if (!usuario || !codigo) {
                msg.style.color = 'red';
                msg.textContent = 'Preencha todos os campos!';
                return;
            }

            try {
                const res = await fetch('/verificar-codigo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, codigo })
                });

                const data = await res.json();

                if (!res.ok) {
                    msg.style.color = 'red';
                    msg.textContent = data.erro || 'Código inválido';
                    return;
                }

                // Código válido → redireciona para reset-password com usuário
                localStorage.setItem('recuperarUsuario', usuario);
                window.location.href = 'reset-password.html';

            } catch (err) {
                msg.style.color = 'red';
                msg.textContent = 'Erro de conexão com o servidor';
                console.error(err);
            }
        };
    </script>
</body>

</html>
