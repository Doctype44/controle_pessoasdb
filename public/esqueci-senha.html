<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="login-box">
        <h2>Recuperar Senha</h2>
        <!-- Passo 1: Enviar usuário/email -->
        <input type="text" id="usuario" placeholder="Usuário ou e-mail">
        <button id="btnEnviar" type="button">Enviar código</button>

        <!-- Passo 2: Verificar código (oculto inicialmente) -->
        <input type="text" id="codigo" placeholder="Código de recuperação" style="display:none">
        <button id="btnVerificar" type="button" style="display:none">
            Verificar código
        </button>

        <!-- Passo 3: Alterar senha (oculto inicialmente) -->
        <input type="password" id="novaSenha" placeholder="Nova senha" style="display:none">
        <button id="btnAlterar" type="button" style="display:none">
            Alterar senha
        </button>

        <div class="msg" id="msg"></div>
    </div>

    <script src="esqueci-senha.js"></script>

</body>

</html>
