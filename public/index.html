<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Dashboard de Pessoas</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body class="light">
    <div class="particles" id="particles"></div>
    <script>
        const particles = document.getElementById('particles');

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 30;
            const y = (e.clientY / window.innerHeight - 0.5) * 30;

            particles.style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>

    <script>
        if (!localStorage.getItem('logado')) {
            window.location.replace('login.html');
        }
    </script>

    <div class="container">

        <div class="sidebar">
            <button type="button" class="tab-button active" data-tab="tab-pessoas">
                <i class="fa-solid fa-user"></i>
            </button>

            <button type="button" class="tab-button" data-tab="tab-estatisticas">
                <i class="fa-solid fa-chart-column"></i>
            </button>

            <button type="button" class="tab-button" data-tab="tab-relatorios">
                <i class="fa-solid fa-file-lines"></i>
            </button>

            <button type="button" class="tab-button" data-tab="tab-configuracoes">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>

        <main class="main-content">


            <!-- PESSOAS -->
            <div class="tab-content active" id="tab-pessoas">
                <div class="top-bar">
                    <h1>Dashboard de Pessoas</h1>
                    <div class="actions">
                        <button class="btn btn-primary" id="btnAddPessoa">Adicionar Pessoa</button>
                        <button class="btn btn-theme" id="btnToggleTheme">Tema Escuro</button>
                        <button class="btn btn-logout" onclick="logout()">Sair</button>
                    </div>
                </div>

                <table class="modern-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Nascimento</th>
                            <th>CPF</th>
                            <th>RG</th>
                            <th>Prazo</th>
                            <th>Ações</th>

                        </tr>
                    </thead>
                    <tbody id="tabela"></tbody>
                </table>
            </div>

            <!-- ESTATÍSTICAS -->
            <div class="tab-content" id="tab-estatisticas">
                <h2>Estatísticas</h2>
                <div class="cards">
                    <div class="card">
                        <h3>Total de Pessoas</h3>
                        <span id="totalPessoas">0</span>
                    </div>
                    <div class="card">
                        <h3>Maiores de 18</h3>
                        <span id="maiores">0</span>
                    </div>
                    <div class="card">
                        <h3>Menores</h3>
                        <span id="menores">0</span>
                    </div>
                </div>
                <canvas id="idadeChart" height="120"></canvas>
            </div>

            <!-- RELATÓRIOS -->
            <div class="tab-content" id="tab-relatorios">
                <h2>Relatórios</h2>

                <div class="relatorio-box">
                    <h3>📌 Pessoas com prazo vencido</h3>

                    <select id="filtroVencidos">
                        <option value="">Todos</option>
                        <option value="hoje">Hoje</option>
                        <option value="7">Últimos 7 dias</option>
                        <option value="30">Últimos 30 dias</option>
                    </select>

                    <table class="tabela-relatorio">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>CPF</th>
                                <th>Data fim</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="listaVencidos">
                            <!-- dados via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- ✅ scripts SEMPRE aqui -->
            <script src="relatorios.js"></script>
</body>

</html>



<!-- CONFIGURAÇÕES -->
<div class="tab-content" id="tab-configuracoes">
    <h2>Configurações</h2>

    <div class="accordion">
        <div class="accordion-header">
            <span><i class="fa-solid fa-user-lock"></i> Conta e Privacidade</span>
            <span class="arrow">▶</span>
        </div>

        <div class="accordion-body">
            <ul>
                <li>
                    <button class="config-btn" onclick="alterarSenha()">
                        <i class="fa-solid fa-key"></i> Alterar senha
                    </button>
                </li>
                <li>
                    <button class="config-btn">
                        <i class="fa-solid fa-shield"></i> Gerenciar login e segurança
                    </button>
                </li>
                <li>
                    <button class="config-btn">
                        <i class="fa-solid fa-lock"></i> Ativar autenticação em dois fatores
                    </button>
                </li>
                <li>
                    <button class="config-btn">
                        <i class="fa-solid fa-desktop"></i> Gerenciar dispositivos conectados
                    </button>
                </li>
            </ul>
        </div>
    </div>
</div>
</main>
</div>
<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModal">&times;</span>
        <h2 id="modalTitle">Adicionar Pessoa</h2>
        <form id="modalForm">

            <div class="modal-section">
                <input type="text" id="nome" placeholder="Nome completo" required>
                <input type="date" id="data_nascimento" required>
                <input type="text" id="cpf" placeholder="CPF" required>
                <input type="text" id="rg" placeholder="RG" required>
            </div>

            <div class="modal-section">
                <label><strong>Prazo</strong></label>
                <input type="date" id="data_inicio" required>
                <input type="date" id="data_fim" required>
            </div>

            <div class="modal-section">
                <input type="text" id="cep" placeholder="CEP">
                <input type="text" id="rua" placeholder="Rua">
                <input type="text" id="bairro" placeholder="Bairro">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="numero" placeholder="Número" style="flex:1;">
                    <input type="text" id="complemento" placeholder="Complemento" style="flex:2;">
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Salvar</button>

        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const tabela = document.getElementById('tabela');
    const modal = document.getElementById('modal');
    const modalForm = document.getElementById('modalForm');
    const btnAddPessoa = document.getElementById('btnAddPessoa');
    const closeModalBtn = document.getElementById('closeModal');
    const btnToggleTheme = document.getElementById('btnToggleTheme');

    let idadeChart;

    /* ===== ABAS ===== */
    const tabButtons = document.querySelectorAll('.tab-button');
    const tabContents = document.querySelectorAll('.tab-content');

    tabButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            tabButtons.forEach(b => b.classList.remove('active'));
            tabContents.forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab).classList.add('active');
            if (btn.dataset.tab === 'tab-estatisticas') atualizarGrafico();
        });
    });

    /* ===== TEMA ===== */
    btnToggleTheme.onclick = () => document.body.classList.toggle('dark');

    /* ===== CEP AUTOMÁTICO (VIACEP) ===== */

    const cepInput = document.getElementById('cep');
    const ruaInput = document.getElementById('rua');
    const bairroInput = document.getElementById('bairro');

    // Filtrar CEP: somente números
    cepInput.addEventListener('input', () => {
        cepInput.value = cepInput.value.replace(/\D/g, '');
    });

    // Buscar CEP ao sair do campo
    cepInput.addEventListener('blur', async () => {
        const cep = cepInput.value;

        // CEP inválido
        if (cep.length !== 8) {
            ruaInput.value = '';
            bairroInput.value = '';
            return;
        }

        try {
            const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await res.json();

            if (data.erro) {
                ruaInput.value = '';
                bairroInput.value = '';
                alert('CEP não encontrado');
                return;
            }

            ruaInput.value = data.logradouro || '';
            bairroInput.value = data.bairro || '';

        } catch (err) {
            ruaInput.value = '';
            bairroInput.value = '';
            alert('Erro ao buscar o CEP');
        }
    });

    /* ===== MODAL ===== */
    btnAddPessoa.onclick = () => { modalForm.reset(); modal.style.display = 'flex'; };
    closeModalBtn.onclick = () => modal.style.display = 'none';

    /* ===== POST ===== */
    modalForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const pessoa = {
            nome: nome.value,
            data_nascimento: data_nascimento.value,
            cpf: cpf.value,
            rg: rg.value,
            cep: cep.value,
            rua: rua.value,
            bairro: bairro.value,
            numero: numero.value,
            complemento: complemento.value,
            data_inicio: data_inicio.value,
            data_fim: data_fim.value
        };

        const res = await fetch('/pessoas', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(pessoa) });
        if (!res.ok) { const err = await res.json(); alert(err.erro); return; }
        modal.style.display = 'none';
        carregarPessoas();
    });

    /* ===== GET ===== */
    function calcularPrazo(inicio, fim) {
        if (!fim) return '<span class="prazo pendente">Pendente</span>';

        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0);

        const dataFim = new Date(fim);
        dataFim.setHours(0, 0, 0, 0);

        const diffDias = Math.ceil((dataFim - hoje) / (1000 * 60 * 60 * 24));

        // ❌ Prazo vencido
        if (diffDias < 0) {
            return '<span class="prazo vencido">Pendente</span>';
        }

        // ⚠️ Próximo do vencimento (até 5 dias)
        if (diffDias <= 5) {
            return '<span class="prazo-avencer">A vencer</span>';
        }

        // ✅ Dentro do prazo
        return '<span class="prazo-ok">No prazo</span>';
    }

    async function carregarPessoas() {
        const res = await fetch('/pessoas');
        const pessoas = await res.json();
        tabela.innerHTML = '';
        let total = pessoas.length, maiores = 0, menores = 0;
        pessoas.forEach(p => {
            const idade = calcularIdade(p.data_nascimento);
            if (idade >= 18) maiores++; else menores++;
            tabela.innerHTML += `
<tr>
    <td>${p.id}</td>
    <td>${p.nome}</td>
    <td>${new Date(p.data_nascimento).toLocaleDateString('pt-BR')}</td>
    <td>${p.cpf}</td>
    <td>-</td>
    <td class="status-coluna">
        <span class="prazo-ok">Sem prazo</span>
    </td>
    <td>
        <button class="btn-delete" onclick="deletarPessoa(${p.id})">
            <i class="fa-solid fa-trash"></i>
        </button>
    </td>
</tr>
`;


        });
        document.getElementById('totalPessoas').textContent = total;
        document.getElementById('maiores').textContent = maiores;
        document.getElementById('menores').textContent = menores;
    }

    /* ===== DELETE ===== */
    async function deletarPessoa(id) { if (!confirm('Deseja excluir?')) return; await fetch(`/pessoas/${id}`, { method: 'DELETE' }); carregarPessoas(); }

    /* ===== IDADE ===== */
    function calcularIdade(data) {
        const hoje = new Date(), nasc = new Date(data);
        let idade = hoje.getFullYear() - nasc.getFullYear();
        if (hoje.getMonth() < nasc.getMonth() || (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate())) idade--;
        return idade;
    }

    /* ===== GRÁFICO ===== */
    async function atualizarGrafico() {
        const res = await fetch('/pessoas');
        const pessoas = await res.json();
        const faixas = { '0-17': 0, '18-25': 0, '26-35': 0, '36-50': 0, '51+': 0 };
        pessoas.forEach(p => {
            const i = calcularIdade(p.data_nascimento);
            if (i <= 17) faixas['0-17']++;
            else if (i <= 25) faixas['18-25']++;
            else if (i <= 35) faixas['26-35']++;
            else if (i <= 50) faixas['36-50']++;
            else faixas['51+']++;
        });
        if (idadeChart) idadeChart.destroy();
        idadeChart = new Chart(document.getElementById('idadeChart'), { type: 'bar', data: { labels: Object.keys(faixas), datasets: [{ label: 'Pessoas', data: Object.values(faixas) }] } });
    }

    /* ===== LOGOUT ===== */
    function logout() { localStorage.removeItem('logado'); window.location.href = 'login.html'; }

    /* ===== ACCORDION CONFIGURAÇÕES ===== */
    const accordions = document.querySelectorAll('.accordion');
    accordions.forEach(acc => {
        const header = acc.querySelector('.accordion-header');
        header.addEventListener('click', () => acc.classList.toggle('expanded'));


    });

    carregarPessoas();


</script>

<!-- MODAL ALTERAR SENHA -->
<div id="modalSenha" class="modal" style="display:none;">
    <div class="modal-content">
        <span class="close" onclick="fecharModalSenha()">&times;</span>
        <h2>Alterar Senha</h2>

        <select id="perfilSenha" required>
            <option value="">Selecione o perfil</option>
            <option value="admin">Admin</option>
            <option value="usuario">Usuário</option>
        </select>

        <input type="text" id="usuarioSenha" placeholder="Usuário" required>
        <input type="password" id="senhaAtual" placeholder="Senha atual" required>
        <input type="password" id="novaSenha" placeholder="Nova senha" required>

        <button type="button" class="btn btn-primary" onclick="salvarNovaSenha()">
            Salvar
        </button>

    </div>
</div>

<script>
    /* ===== ALTERAR SENHA COM PERFIL ===== */

    function alterarSenha() {
        document.getElementById('modalSenha').style.display = 'flex';
    }

    function fecharModalSenha() {
        document.getElementById('modalSenha').style.display = 'none';
    }

    async function salvarNovaSenha() {
        const perfil = document.getElementById('perfilSenha').value;
        const usuario = document.getElementById('usuarioSenha').value;
        const senhaAtual = document.getElementById('senhaAtual').value;
        const novaSenha = document.getElementById('novaSenha').value;

        if (!perfil || !usuario || !senhaAtual || !novaSenha) {
            alert('Preencha todos os campos');
            return;
        }

        if (novaSenha.length < 6) {
            alert('A nova senha deve ter no mínimo 6 caracteres');
            return;
        }

        try {
            const res = await fetch('/alterar-senha', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    perfil,
                    usuario,
                    senhaAtual,
                    novaSenha
                })
            });

            const data = await res.json();

            if (!res.ok) {
                alert(data.erro || 'Erro ao alterar senha');
                return;
            }

            alert('Senha alterada com sucesso!');
            fecharModalSenha();

        } catch (err) {
            alert('Erro de conexão com o servidor');
        }
    }

    /* expõe funções para o HTML */
    window.alterarSenha = alterarSenha;
    window.fecharModalSenha = fecharModalSenha;
    window.salvarNovaSenha = salvarNovaSenha;
</script>


</body>

</html>
