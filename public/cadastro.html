<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="login-box">
        <h2>Cadastro</h2>

        <div class="error" id="msg"></div>

        <input type="text" id="usuario" placeholder="Usuário">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha" placeholder="Senha">
        <input type="text" id="nome" placeholder="Nome completo">
        <input type="text" id="cpf" placeholder="CPF">
        <input type="date" id="data_nascimento">

        <button type="button" id="btnCadastrar">Cadastrar</button>
        <button type="button" onclick="window.location.href='login.html'">Voltar</button>
    </div>

    <script>
        const btnCadastrar = document.getElementById('btnCadastrar');
        const msg = document.getElementById('msg');

        btnCadastrar.onclick = async () => {
            const usuario = document.getElementById('usuario').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const nome = document.getElementById('nome').value.trim();
            const cpf = document.getElementById('cpf').value.trim();
            const data_nascimento = document.getElementById('data_nascimento').value;

            if (!usuario || !email || !senha || !nome || !cpf || !data_nascimento) {
                msg.textContent = 'Preencha todos os campos';
                return;
            }

            try {
                const response = await fetch('/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        usuario,
                        email,
                        senha,
                        nome,
                        cpf,
                        data_nascimento
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Cadastro realizado com sucesso!');
                    window.location.href = 'login.html';
                } else {
                    msg.textContent = data.erro || 'Erro ao cadastrar';
                }

            } catch (err) {
                msg.textContent = 'Erro ao conectar com o servidor';
            }
        };
    </script>

</body>

</html>
