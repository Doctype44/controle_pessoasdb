<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Redefinir Senha</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="login-box">
        <h2>Redefinir Senha</h2>

        <input type="password" id="novaSenha" placeholder="Nova senha">
        <input type="password" id="confirmaSenha" placeholder="Confirme a senha">

        <button id="btnSalvar">Salvar</button>

        <div class="msg" id="msg"></div>
    </div>

    <script>
        const btnSalvar = document.getElementById('btnSalvar');
        const msg = document.getElementById('msg');

        btnSalvar.onclick = async () => {
            const novaSenha = document.getElementById('novaSenha').value;
            const confirmaSenha = document.getElementById('confirmaSenha').value;
            const usuario = localStorage.getItem('recuperarUsuario');

            if (!novaSenha || !confirmaSenha) {
                msg.style.color = 'red';
                msg.textContent = 'Preencha todos os campos!';
                return;
            }

            if (novaSenha !== confirmaSenha) {
                msg.style.color = 'red';
                msg.textContent = 'As senhas não coincidem!';
                return;
            }

            if (novaSenha.length < 6) {
                msg.style.color = 'red';
                msg.textContent = 'A senha deve ter no mínimo 6 caracteres';
                return;
            }

            try {
                const res = await fetch('/usuarios/alterar-senha', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, novaSenha })
                });

                const data = await res.json();

                if (!res.ok) {
                    msg.style.color = 'red';
                    msg.textContent = data.erro || 'Erro ao alterar senha';
                    return;
                }

                msg.style.color = 'green';
                msg.textContent = 'Senha alterada com sucesso! Redirecionando...';
                localStorage.removeItem('recuperarUsuario');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);

            } catch (err) {
                msg.style.color = 'red';
                msg.textContent = 'Erro de conexão com o servidor';
                console.error(err);
            }
        };
    </script>
</body>

</html>
